- name: Enable GitHub import source
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/application/settings"
    method: PUT
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    body:
      import_sources: ["github"]
    body_format: json
    status_code: [200, 201]

- name: Check if project exists
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects?search={{ project_name }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
  register: project_check

- name: Import project from GitHub
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    body:
      name: "{{ project_name }}"
      import_url: "https://github.com/{{ github_owner }}/{{ github_repo }}.git"
      visibility: "private"
      import_type: "github"
      personal_access_token: "{{ github_token }}"
    body_format: json
    status_code: [200, 201]
  register: import_result  
  when: project_check.json | length == 0

- name: Get existing project ID
  set_fact:
    gitlab_project_id: "{{ project_check.json[0].id }}"
  when: project_check.json | length > 0

- name: Set project ID from import
  set_fact:
    gitlab_project_id: "{{ import_result.json.id }}"
  when: import_result is defined and import_result.json is defined

- name: Add Docker Hub variables
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/variables/{{ item.key }}"
    method: PUT
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    body:      
      value: "{{ item.value }}"
      protected: true
      masked: "{{ item.masked | default(false) }}"
    body_format: json
    status_code: [200, 201]
  loop:
    - { key: "DOCKER_HUB_USERNAME", value: "{{ dockerhub_username }}", masked: false }
    - { key: "DOCKER_HUB_TOKEN", value: "{{ dockerhub_token }}", masked: true }
    - { key: "KUBE_NAMESPACE", value: "{{ kube_namespace | default('nginx-app') }}", masked: false }
  ignore_errors: yes

- name: Create pipeline trigger
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/triggers"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    body:
      description: "github-webhook"
    body_format: json
    status_code: [200, 201]
  register: trigger

- name: Создать webhook для репозитория
  uri:
    url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/hooks"
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
    body:
      name: "web"
      active: true
      events: ["push", "release"]
      config:
        url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/trigger/pipeline?token={{ trigger.json.token }}&ref=main"
        content_type: "json"        
        insecure_ssl: "1"
    body_format: json

- name: Display webhook URL
  debug:
    msg: |
      ==================================================
      CI/CD настройка завершена!
      
      GitLab Project ID: {{ gitlab_project_id }}
      Webhook URL: http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/trigger/pipeline?token={{ trigger.json.token }}&ref=main
      
      Настройте этот URL как webhook в GitHub репозитории.
      ==================================================