- name: Get runner registration token
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
  register: project_data

- name: Register runner with registration token
  shell: |
    sudo gitlab-runner register \
      --non-interactive \
      --url http://localhost \
      --registration-token {{ project_data.json.runners_token }} \
      --executor docker \
      --docker-image docker:24-dind \
      --docker-privileged

- name: Create pipeline trigger
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/triggers"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    body:
      description: "github-webhook"
    body_format: json
    status_code: [200, 201]
  register: trigger

- name: Создать webhook для репозитория
  uri:
    url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/hooks"
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
    body:
      name: "web"
      active: true
      events: ["push", "release"]
      config:
        url: "http://{{ gitlab_external_url }}/api/v4/projects/{{ gitlab_project_id }}/trigger/pipeline?token={{ trigger.json.token }}&ref=main"
        content_type: "json"        
        insecure_ssl: "1"
    status_code: [201,200]
    body_format: json

- name: Get GitHub repo public key
  uri:
    url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/actions/secrets/public-key"
    method: GET
    headers:
      Authorization: "token {{ github_token }}"
  register: public_key    

- name: Add GitLab token to GitHub repository secrets
  uri:
    url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/actions/secrets/GITLAB_TOKEN"
    method: PUT
    headers:
      Authorization: "token {{ github_token }}"
    body:
      encrypted_value: "{{ gitlab_token | b64encode }}"
      key_id: "{{ public_key.json.key_id }}"
    body_format: json
    status_code: [201, 204]  

- name: Display webhook URL
  debug:
    msg: |
      ==================================================
      CI/CD настройка завершена!
       
      GitLab Project ID: {{ gitlab_project_id }}
      Webhook URL: http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/trigger/pipeline?token={{ trigger.json.token }}&ref=main
       
      Настройте этот URL как webhook в GitHub репозитории.
      ==================================================