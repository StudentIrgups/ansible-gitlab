# roles/gitlab-cicd/tasks/main.yml
---
- name: Wait for GitLab to be ready
  uri:
    url: "http://{{ ansible_default_ipv4.address }}"
    method: GET
    status_code: [200, 302]
  register: gitlab_check
  until: gitlab_check.status in [200, 302]
  retries: 60
  delay: 10

- name: Wait for GitLab Rails to be ready
  shell: docker exec gitlab gitlab-rails runner "puts 'ready'"
  register: rails_check
  until: rails_check.stdout == "ready"
  retries: 30
  delay: 10  
  become: yes

- name: Get root password
  shell: docker exec gitlab cat /etc/gitlab/initial_root_password | grep Password | awk '{print $2}'
  register: root_password  

- name: Set admin password
  set_fact:
    gitlab_admin_password: "{{ root_password.stdout }}"      

- name: Create token via Rails (fallback method)
  shell: |
    docker exec gitlab gitlab-rails runner 'user = User.find_by_username("root"); 
    token = user.personal_access_tokens.create!(name: "ansible", scopes: ["api"], expires_at: 365.days.from_now); 
    puts token.token'
  register: rails_token
  changed_when: false
  failed_when: false

- name: Set token
  set_fact:
    gitlab_token: "{{ rails_token.stdout }}"    

- name: Save token to file
  copy:
    content: "{{ gitlab_token }}"
    dest: "/tmp/gitlab_api_token.txt"
    mode: '0600'
  when: gitlab_token != ''

- name: Display token for manual setup if auto failed
  debug:
    msg: |
      ==================================================
      Не удалось создать токен автоматически
      
      Создайте вручную в GitLab:
      1. http://{{ ansible_default_ipv4.address }}
      2. User Settings → Access Tokens
      3. Name: ansible, Scopes: api
      4. Токен добавьте в vault.yml
      ==================================================
  when: gitlab_token == ''

- name: Check if API token is valid
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/version"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    status_code: 200
  register: token_check
  failed_when: false

- name: Fail if token is invalid
  fail:
    msg: |
      GitLab API token недействителен!
      
      Создайте токен вручную:
      1. Войдите в GitLab: http://{{ ansible_default_ipv4.address }}
      2. User Settings → Access Tokens
      3. Scopes: api
      4. Добавьте токен в vault.yml: gitlab_api_token: "glpat-..."
  when: token_check.status != 200

- name: Clone GitHub repo
  git:
    repo: "https://{{ github_token }}@github.com/{{ github_owner }}/{{ github_repo }}.git"
    dest: "/tmp/{{ project_name }}"

- name: Push to GitLab with encoded password
  shell: |
    cd /tmp/{{ project_name }}
    ENCODED_PASS=$(python3 -c "import urllib.parse; print(urllib.parse.quote('{{ gitlab_admin_password }}', safe=''))")
    git remote add gitlab http://root:${ENCODED_PASS}@{{ ansible_default_ipv4.address }}/root/{{ project_name }}.git
    git push gitlab --all

- name: Get project ID from GitLab
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects?search={{ project_name }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
  register: project_info

- name: Set project ID
  set_fact:
    gitlab_project_id: "{{ project_info.json[0].id }}"

- name: Add Docker Hub variables
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/variables/{{ item.key }}"
    method: PUT
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    body:      
      value: "{{ item.value }}"
      protected: true
      masked: "{{ item.masked | default(false) }}"
    body_format: json
    status_code: [200, 201]
  loop:
    - { key: "DOCKER_HUB_USERNAME", value: "{{ dockerhub_username }}", masked: false }
    - { key: "DOCKER_HUB_TOKEN", value: "{{ dockerhub_token }}", masked: true }
    - { key: "KUBE_NAMESPACE", value: "{{ kube_namespace | default('nginx-app') }}", masked: false }
  ignore_errors: yes

- name: Create pipeline trigger
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/triggers"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ gitlab_token }}"
    body:
      description: "github-webhook"
    body_format: json
    status_code: [200, 201]
  register: trigger

- name: Создать webhook для репозитория
  uri:
    url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/hooks"
    method: POST
    headers:
      Authorization: "token {{ github_token }}"
    body:
      name: "web"
      active: true
      events: ["push", "release"]
      config:
        url: "http://{{ gitlab_external_url }}/api/v4/projects/{{ gitlab_project_id }}/trigger/pipeline?token={{ trigger.json.token }}&ref=main"
        content_type: "json"        
        insecure_ssl: "1"
    body_format: json

- name: Display webhook URL
  debug:
    msg: |
      ==================================================
      CI/CD настройка завершена!
      
      GitLab Project ID: {{ gitlab_project_id }}
      Webhook URL: http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/trigger/pipeline?token={{ trigger.json.token }}&ref=main
      
      Настройте этот URL как webhook в GitHub репозитории.
      ==================================================