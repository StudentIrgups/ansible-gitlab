# roles/gitlab-cicd/tasks/main.yml
---
- name: Wait for GitLab to be ready
  uri:
    url: "http://{{ ansible_default_ipv4.address }}"
    method: GET
    status_code: [200, 302]
  register: gitlab_check
  until: gitlab_check.status in [200, 302]
  retries: 60
  delay: 10

- name: Get root password
  shell: docker exec gitlab cat /etc/gitlab/initial_root_password | grep Password | awk '{print $2}'
  register: root_password  

- name: Create token via session API (GitLab CE compatible)
  block:
    - name: Get authenticity token
      uri:
        url: "http://{{ ansible_default_ipv4.address }}/users/sign_in"
        method: GET
        return_content: yes
      register: login_page
      
    - name: Extract CSRF token
      set_fact:
        csrf_token: "{{ login_page.content | regex_search('name=\"authenticity_token\" value=\"([^\"]+)\"', '\\1') | first }}"
      
    - name: Login and create token
      uri:
        url: "http://{{ ansible_default_ipv4.address }}/-/profile/personal_access_tokens"
        method: POST
        body:
          authenticity_token: "{{ csrf_token }}"
          personal_access_token:
            name: "ansible-auto"
            scopes: ["api"]
          commit: "Create personal access token"
        body_format: form-urlencoded
        headers:
          Cookie: "{{ login_page.cookies_string }}"
        follow_redirects: all
        status_code: [200, 302]
      register: token_creation
      
    - name: Get created token
      uri:
        url: "http://{{ ansible_default_ipv4.address }}/-/profile/personal_access_tokens"
        method: GET
        return_content: yes
        headers:
          Cookie: "{{ login_page.cookies_string }}"
      register: tokens_page
      
    - name: Extract token from page
      set_fact:
        new_token: "{{ tokens_page.content | regex_search('ansible-auto.*?token\">([^<]+)<', '\\1') | first | default('NOT_FOUND') }}"
  rescue:
    - set_fact:
        new_token: "FALLBACK"

- name: Set token
  set_fact:
    gitlab_token: "{{ new_token | default('') }}"

- name: Save token to file
  copy:
    content: "{{ new_token }}"
    dest: "/tmp/gitlab_api_token.txt"
    mode: '0600'
  when: new_token != ''

- name: Display token for manual setup if auto failed
  debug:
    msg: |
      ==================================================
      ⚠️  Не удалось создать токен автоматически
      
      Создайте вручную в GitLab:
      1. http://{{ ansible_default_ipv4.address }}
      2. User Settings → Access Tokens
      3. Name: ansible, Scopes: api
      4. Токен добавьте в vault.yml
      ==================================================
  when: new_token == ''

- name: Check if API token is valid
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/version"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ new_token }}"
    status_code: 200
  register: token_check
  failed_when: false

- name: Fail if token is invalid
  fail:
    msg: |
      GitLab API token недействителен!
      
      Создайте токен вручную:
      1. Войдите в GitLab: http://{{ ansible_default_ipv4.address }}
      2. User Settings → Access Tokens
      3. Scopes: api
      4. Добавьте токен в vault.yml: gitlab_api_token: "glpat-..."
  when: token_check.status != 200

- name: Create GitLab project
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ new_token }}"
    body:
      name: "{{ project_name }}"
      visibility: "private"
    body_format: json
    status_code: [200, 201]
  register: project
  when: token_check.status == 200

- name: Save project ID
  set_fact:
    gitlab_project_id: "{{ project.json.id }}"

- name: Add Docker Hub variables
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/variables"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ new_token }}"
    body:
      key: "{{ item.key }}"
      value: "{{ item.value }}"
      protected: true
      masked: "{{ item.masked | default(false) }}"
    body_format: json
  loop:
    - { key: "DOCKER_HUB_USERNAME", value: "{{ dockerhub_username }}", masked: false }
    - { key: "DOCKER_HUB_TOKEN", value: "{{ dockerhub_token }}", masked: true }
    - { key: "KUBE_NAMESPACE", value: "{{ kube_namespace | default('production') }}", masked: false }
  ignore_errors: yes

- name: Create pipeline trigger
  uri:
    url: "http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/triggers"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ new_token }}"
    body:
      description: "github-webhook"
    body_format: json
  register: trigger

- name: Display webhook URL
  debug:
    msg: |
      ==================================================
      ✅ CI/CD настройка завершена!
      
      GitLab Project ID: {{ gitlab_project_id }}
      Webhook URL: http://{{ ansible_default_ipv4.address }}/api/v4/projects/{{ gitlab_project_id }}/trigger/pipeline?token={{ trigger.json.token }}&ref=main
      
      Настройте этот URL как webhook в GitHub репозитории.
      ==================================================