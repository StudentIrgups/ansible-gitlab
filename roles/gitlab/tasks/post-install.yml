---
- name: Get GitLab root password
  shell: |
    kubectl get secret gitlab-gitlab-initial-root-password \
      -n {{ gitlab_namespace }} \
      -o jsonpath="{.data.password}" 2>/dev/null | base64 --decode
  register: gitlab_password
  failed_when: false

- name: Get bastion public IP
  shell: curl -s ifconfig.me
  register: bastion_ip

- name: Display GitLab access information
  debug:
    msg: |
      ================================================
      ✅ GitLab Successfully Deployed!
      ================================================
      URL: http://{{ bastion_ip.stdout }}:{{ gitlab_nginx_port }}
      Username: root
      Password: {{ gitlab_password.stdout }}
      ================================================

- name: Save access info to file
  copy:
    content: |
      GitLab URL: http://{{ bastion_ip.stdout }}:{{ gitlab_nginx_port }}
      Username: root
      Password: {{ gitlab_password.stdout }}
    dest: /tmp/gitlab-access.txt
    mode: '0600'

- name: Create backup script
  template:
    src: backup-script.sh.j2
    dest: /usr/local/bin/gitlab-backup.sh
    mode: '0755'
  when: gitlab_backup_enabled