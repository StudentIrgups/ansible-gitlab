---
# GitLab Configuration
gitlab_namespace: "gitlab"
gitlab_domain: "gitlab.local"
gitlab_chart_version: "7.10.0"
gitlab_runner_chart_version: "0.58.0"
gitlab_nodeport: 33000

# Kubernetes Configuration
storage_class_name: "yc-network-ssd"
kubeconfig_path: "~/.kube/config"

# Resource Limits
gitlab_resources:
  webservice:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2000m"
  sidekiq:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# Backup Settings
gitlab_backup_enabled: true
gitlab_backup_retention_days: 7
gitlab_backup_schedule: "0 2 * * *"

# GitLab Runner
gitlab_install_runner: true
gitlab_runner_tags: "kubernetes,docker"

gitlab_email: "admin@example.com"