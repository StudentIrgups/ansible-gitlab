---
- name: Deploy GitLab on dedicated VM
  hosts: gitlab
  become: yes
  vars_files:
    - inventory/production/group_vars/all/vars.yml
    - inventory/production/group_vars/all/vault.yml
  
  vars:
    gitlab_hostname: "gitlab.local"
    install_gitlab_runner: true
  
  roles:
    - gitlab-vm

- name: Configure CI/CD automation
  hosts: gitlab
  vars_files:
    - inventory/production/group_vars/all/vars.yml
    - inventory/production/group_vars/all/vault.yml
  
  roles:
    - gitlab-cicd