---
- name: Deploy GitLab to Kubernetes
  hosts: localhost
  connection: local
  gather_facts: yes
  vars_files:
    - inventory/production/group_vars/all/vars.yml
    - inventory/production/group_vars/all/vault.yml
  
  tasks:
    - name: Check cluster connectivity
      command: kubectl cluster-info
      register: cluster_info
      failed_when: cluster_info.rc != 0
    
    - name: Create namespace for GitLab
      shell: |
        kubectl create namespace {{ gitlab_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      register: ns_result
      failed_when: ns_result.rc != 0
    
    - name: Add GitLab Helm repository
      shell: |
        helm repo add gitlab https://charts.gitlab.io 2>/dev/null || true
      register: repo_add
      failed_when: repo_add.rc != 0
    
    - name: Update Helm repositories
      command: helm repo update
    
    - name: Create GitLab secrets
      shell: |
        kubectl create secret generic gitlab-secrets \
          --namespace={{ gitlab_namespace }} \
          --from-literal=initial_root_password="{{ gitlab_root_password }}" \
          --from-literal=runner-registration-token="{{ gitlab_runner_token }}" \
          --dry-run=client -o yaml | kubectl apply -f -
      register: secret_result
      failed_when: secret_result.rc != 0
    
    - name: Create StorageClass for GitLab
      shell: |
        cat << EOF | kubectl apply -f -
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: gitlab-storage
        provisioner: disk-csi-driver.mks.ycloud.io
        parameters:
          type: network-ssd
        allowVolumeExpansion: true
        volumeBindingMode: WaitForFirstConsumer
        EOF
      register: sc_result
      failed_when: sc_result.rc != 0
    
    - name: Generate GitLab Helm values
      copy:
        content: |
          global:
            hosts:
              domain: {{ gitlab_domain }}
              https: false
            ingress:
              enabled: false
          
          nginx-ingress:
            enabled: false
          
          gitlab:
            webservice:
              replicas: 1
              resources:
                requests:
                  memory: {{ gitlab_resources.webservice.requests.memory }}
                  cpu: {{ gitlab_resources.webservice.requests.cpu }}
                limits:
                  memory: {{ gitlab_resources.webservice.limits.memory }}
                  cpu: {{ gitlab_resources.webservice.limits.cpu }}
            
            sidekiq:
              resources:
                requests:
                  memory: {{ gitlab_resources.sidekiq.requests.memory }}
                  cpu: {{ gitlab_resources.sidekiq.requests.cpu }}
                limits:
                  memory: {{ gitlab_resources.sidekiq.limits.memory }}
                  cpu: {{ gitlab_resources.sidekiq.limits.cpu }}
          
          postgresql:
            persistence:
              size: 50Gi
          
          redis:
            persistence:
              size: 20Gi
          
          prometheus:
            install: false
          
          grafana:
            enabled: false
        dest: /tmp/gitlab-values.yaml
    
    - name: Install GitLab via Helm
      shell: |
        helm upgrade --install gitlab gitlab/gitlab \
          --namespace {{ gitlab_namespace }} \
          --values /tmp/gitlab-values.yaml \
          --timeout 30m \
          --wait
      register: helm_install
      failed_when: helm_install.rc != 0
    
    - name: Wait for GitLab webservice
      shell: |
        kubectl wait --for=condition=ready pod \
          -l app=webservice,release=gitlab \
          -n {{ gitlab_namespace }} \
          --timeout=600s
      register: wait_result
      failed_when: wait_result.rc != 0
    
    - name: Create NodePort service for GitLab
      shell: |
        cat << EOF | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: gitlab-nodeport
          namespace: {{ gitlab_namespace }}
        spec:
          type: NodePort
          ports:
          - port: 80
            targetPort: 8181
            nodePort: {{ gitlab_nodeport }}
          selector:
            app: webservice
            release: gitlab
        EOF
      register: svc_result
      failed_when: svc_result.rc != 0
    
    - name: Get worker node IP
      shell: |
        kubectl get nodes -o wide --selector='!node-role.kubernetes.io/control-plane' \
          -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'
      register: worker_ip
    
    - name: Install GitLab Runner
      shell: |
        helm upgrade --install gitlab-runner gitlab/gitlab-runner \
          --namespace {{ gitlab_namespace }} \
          --set gitlabUrl="http://{{ worker_ip.stdout }}:{{ gitlab_nodeport }}" \
          --set runnerRegistrationToken="{{ gitlab_runner_token }}" \
          --set runners.privileged=true \
          --set runners.tags="{{ gitlab_runner_tags }}" \
          --set resources.requests.memory="256Mi" \
          --set resources.requests.cpu="100m" \
          --set resources.limits.memory="512Mi" \
          --set resources.limits.cpu="500m" \
          --wait
      when: gitlab_install_runner | default(true)
      register: runner_result
      failed_when: runner_result.rc != 0
    
    - name: Get GitLab root password
      shell: |
        kubectl get secret gitlab-gitlab-initial-root-password -n {{ gitlab_namespace }} \
          -o jsonpath="{.data.password}" 2>/dev/null | base64 --decode || \
        kubectl get secret gitlab-secrets -n {{ gitlab_namespace }} \
          -o jsonpath="{.data.initial_root_password}" | base64 --decode
      register: root_password
    
    - name: Display access information
      debug:
        msg: |
          ==================================================
          ✅ GitLab successfully deployed!
          
          Internal URL: http://{{ worker_ip.stdout }}:{{ gitlab_nodeport }}
          Username: root
          Password: {{ root_password.stdout }}
          
          For external access, use SSH tunnel:
          ssh -L {{ gitlab_nodeport }}:{{ worker_ip.stdout }}:{{ gitlab_nodeport }} ubuntu@<bastion-ip>
          Then open: http://localhost:{{ gitlab_nodeport }}
          
          GitLab Runner: {{ 'Installed' if gitlab_install_runner else 'Not installed' }}
          ==================================================
    
    - name: Save access info to file
      copy:
        content: |
          GitLab URL: http://{{ worker_ip.stdout }}:{{ gitlab_nodeport }}
          Username: root
          Password: {{ root_password.stdout }}
        dest: /tmp/gitlab-access.txt
        mode: '0600'